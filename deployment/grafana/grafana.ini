[paths]
provisioning = /etc/grafana/provisioning
alerting = /etc/grafana/provisioning/alerting
notifiers = /etc/grafana/provisioning/notifiers

[server]
enable_gzip = true

[users]
default_theme = dark

[auth.anonymous]
enabled = true
org_role = Admin

[auth]
disable_login_form = true

[log.console]
level = error