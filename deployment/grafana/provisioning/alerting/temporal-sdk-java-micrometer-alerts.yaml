        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): server throttling respond operations — leading indicator for task timeouts"
          description: |
            **1. Check the server Resource Exhausted panel.**
            Check the [**Resource Exhausted with Cause** panel (§6 — Throttling and Limits)](../../../dashboards/server/temporal-server-readme.md) on the server dashboard — identify the throttle cause (`RpsLimit`, `ConcurrentLimit`, `SystemOverloaded`, `CircuitBreakerOpen`).

            **2. Check persistence latency.**
            Check the [**Persistence Latencies** panel (§3 — Persistence Requests, Latencies and Errors)](../../../dashboards/server/temporal-server-readme.md#3-persistence-requests-latencies-and-errors) filtered to `UpdateWorkflowExecution` — high persistence latency on this operation is the most common root cause of throttling on respond operations. The frontend service backs up when the database is slow and starts shedding load.

            **3. Check namespace RPS limits.**
            If the cause is `RpsLimit`, consider increasing `frontend.namespaceRPS` via dynamic config — but only after confirming persistence latency is healthy.

            **4. Check for cascading timeouts.**
            Cross-check alert [#1a — NOT_FOUND on WFT Respond Operations](./01a-not-found-wft-respond.md) and alert [#1b — NOT_FOUND on Activity Respond Operations](./01b-not-found-activity-respond.md) — if those are also firing, throttling has already cascaded into task timeouts.

            **5. Check for system overload.**
            If the cause is `SystemOverloaded` or `CircuitBreakerOpen`, cross-check server alert [#30 — System Overload Throttling](../../server/runbooks/30-system-overload-throttling.md).
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/02b-resource-exhausted-respond-ops.md

      - uid: temporal-sdk-java-micrometer-005
        title: "Temporal SDK Java (Micrometer): Request Failure UNIMPLEMENTED"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P7AC1CE4626B85CB6  # DATASOURCE
            model:
              editorMode: code
              expr: |
                sum by (namespace, operation) (
                  rate(temporal_request_failure_total{status_code="UNIMPLEMENTED"}[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 2m
        labels:
          severity: critical
          service: temporal-sdk
          component: request
        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): UNIMPLEMENTED from server — wrong binary or version mismatch"
          description: |
            **1. Check your server deployment.**
            This is the most common cause. Check whether the correct server binary is running — a wrong binary deployed to one or more pods, a corrupted deployment, or a service routing issue sending requests to the wrong handler can all produce UNIMPLEMENTED responses on valid operations. Check pod versions across all history, matching, and frontend pods.

            **2. Check the Service Panics panel.**
            Check the [**Service Panics** panel (§5 — Service Requests and Errors)](../../../dashboards/server/temporal-server-readme.md) on the server dashboard — a wrong binary or corrupted deployment often produces panics alongside UNIMPLEMENTED responses. Any non-zero value here is a critical signal.

            **3. Check the Service Errors panel.**
            Check the [**Service Errors by Namespace** panel (§5)](../../../dashboards/server/temporal-server-readme.md) — a spike in errors correlated with the UNIMPLEMENTED alert confirms the server is not processing requests normally.

            **4. Check SDK version compatibility.**
            If the deployment looks correct, check whether you are running a very old SDK version that is calling an API that has been removed or significantly changed on the server. Review the Temporal SDK changelog for breaking API changes between your SDK version and your server version.
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/05-unimplemented.md

