        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): INTERNAL errors from server — infrastructure issue"
          description: |
            **1. Check the Service Panics panel.**
            Check the [**Service Panics** panel (§5 — Service Requests and Errors)](../../../dashboards/server/temporal-server-readme.md) on the server dashboard — any panic is a critical signal and is almost always the root cause of sustained INTERNAL errors. Investigate the panic message immediately.

            **2. Check the Service Errors panel.**
            Check the [**Service Errors by Namespace** panel (§5)](../../../dashboards/server/temporal-server-readme.md) — confirm the scope of errors. If errors are isolated to a single namespace, the problem may be namespace-specific. If errors are cluster-wide, the problem is infrastructure-level.

            **3. Check persistence errors and availability.**
            Check the [**Persistence Errors by Namespace and Operation** panel (§3)](../../../dashboards/server/temporal-server-readme.md) and the [**Persistence Availability** panel (§3 — Persistence Requests, Latencies and Errors)](../../../dashboards/server/temporal-server-readme.md#3-persistence-requests-latencies-and-errors) — sustained persistence errors are a common root cause of INTERNAL responses. If the database is returning errors, the server wraps them as INTERNAL and returns them to the caller.

            **4. Check server health and deployment.**
            Verify all server pods are healthy and running the correct binary. Check pod logs for stack traces or error messages. If a recent deployment was made, consider rolling back.
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/06-internal.md

      - uid: temporal-sdk-java-micrometer-012
        title: "Temporal SDK Java (Micrometer): RespondWorkflowTaskCompleted Rate Dropped to Zero"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P7AC1CE4626B85CB6  # DATASOURCE
            model:
              editorMode: code
              expr: |
                (
                  sum by (namespace, task_queue) (
                    rate(temporal_request_total{operation="RespondWorkflowTaskCompleted"}[5m])
                  ) or vector(0)
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          service: temporal-sdk
          component: wft
        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "3"
          summary: "Temporal SDK Java (Micrometer): WFT completions dropped to zero — workflow progress halted"
          description: |
            **1. Check if polling has also stopped.**
            Check `temporal_num_pollers` for `worker_type=WorkflowWorker` on the SDK dashboard. If pollers are also at zero, workers are down entirely — cross-check alert [#15 — All Pollers Disconnected](./15-all-pollers-disconnected.md) and check auth failure alert [#4](../alerts-index.md#alert-4--request-failure-authentication--authorization-failure) and UNIMPLEMENTED alert [#5](./05-unimplemented.md). Check worker pod health in your infrastructure observability stack.

            **2. Check if workers are failing tasks instead of completing them.**
            If polling is active but completions are zero, check `temporal_workflow_task_execution_failed` on the SDK dashboard — workers may be consistently failing tasks. Cross-check alert [#21 — WFT Execution Failed: NonDeterminismError](./21-nde.md) and alert [#22 — WFT Execution Failed: GrpcMessageTooLarge](./22-grpc-message-too-large.md).

            **3. Check worker task slots.**
            Cross-check alert [#14 — Worker Task Slots Exhausted](./14-worker-slots-exhausted.md) for `worker_type=WorkflowWorker` — if all slots are occupied, the SDK blocks before issuing the next poll and no new tasks are picked up or completed.

            **4. Check for RESOURCE_EXHAUSTED on respond operations.**
            Cross-check alert [#2b — RESOURCE_EXHAUSTED on Respond Operations](./02b-resource-exhausted-respond-ops.md) — sustained throttling on `RespondWorkflowTaskCompleted` suppresses this counter directly since the SDK only increments it after a successful response.

            **5. Check WFT schedule-to-start latency.**
            Cross-check alerts [#19](./19-wft-schedule-to-start-critical.md) and [#19b](./19b-wft-schedule-to-start-severe.md) — if tasks are not being dispatched to workers, completions will drop to zero even when workers are healthy.

            **6. Check overall cluster health.**
            Check the server dashboard: [**Service Errors by Namespace** (§5)](../../../dashboards/server/temporal-server-readme.md), [**Persistence Availability** (§3)](../../../dashboards/server/temporal-server-readme.md#3-persistence-requests-latencies-and-errors), and [**Resource Exhausted with Cause** (§6)](../../../dashboards/server/temporal-server-readme.md).
