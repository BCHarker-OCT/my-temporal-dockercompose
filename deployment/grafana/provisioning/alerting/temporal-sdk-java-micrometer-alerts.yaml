# Temporal SDK — Java SDK (Micrometer reporter) Essential Alert Set
#
# Grafana alerting provisioning file. Drop into provisioning/alerting/ in your
# Grafana installation.
#
# Java Micrometer metric naming:
#   - Counters:   _total suffix (e.g. temporal_request_failure_total)
#   - Histograms: _seconds_bucket suffix
#   - Gauges:     no suffix (e.g. temporal_num_pollers, temporal_worker_task_slots_available)
#   - status_code label values: UPPER_CASE (e.g. NOT_FOUND, RESOURCE_EXHAUSTED)
#
# See temporal-sdk-java-micrometer.json dashboard (UID: temporal-sdk-java-micrometer-v1)
# See alerts-index.md for full descriptions and runbooks/ for triage guidance.

apiVersion: 1

groups:
  - orgId: 1
    name: temporal-sdk-java-micrometer-essential
    folder: Temporal SDK
    interval: 1m
    rules:

      - uid: temporal-sdk-java-micrometer-001a
        title: "Temporal SDK Java (Micrometer): NOT_FOUND on WFT Respond Operations"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P7AC1CE4626B85CB6  # DATASOURCE
            model:
              editorMode: code
              expr: |
                sum by (namespace, operation) (
                  rate(temporal_request_failure_total{status_code="NOT_FOUND", operation=~"RespondWorkflowTaskCompleted|RespondWorkflowTaskFailed"}[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          service: temporal-sdk
          component: wft
        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): NOT_FOUND on WFT respond — server timed out task or execution no longer running"
          description: |
            **1. Check WFT execution latency.**
            Look at `temporal_workflow_task_execution_latency` on the SDK dashboard for the affected namespace and task queue. If p99 is elevated and approaching or exceeding the WFT timeout (default 10s), the worker is consistently finishing too late and the server is timing out tasks.

            **2. Check WFT replay latency.**
            If WFT execution latency is elevated, check `temporal_workflow_task_replay_latency` next. High replay latency means the worker is spending too long re-executing history before reaching the new command — check for large history size and cross-check alert [#35 — WFT Replay Latency High](../alerts-index.md#alert-35--wft-replay-latency-high). Also check alert [#16 — Sticky Cache Forced Evictions High](../alerts-index.md#alert-16--sticky-cache-forced-evictions-high) and alert [#34 — Sticky Cache Disabled](../alerts-index.md#alert-34--sticky-cache-disabled) — high eviction rates force frequent cold replays which inflate execution latency.

            **3. Check worker pod resources.**
            Check CPU and memory utilization on the worker pods — high CPU slows WFT execution directly. Also check for cold-start issues on the pod that picked up the task: look at the `identity` field in the `WorkflowTaskStarted` history event to identify which worker pod ran the task.

            **4. Check for RESOURCE_EXHAUSTED on respond operations.**
            Cross-check alert [#2b — RESOURCE_EXHAUSTED on Respond Operations](../alerts-index.md#alert-2b--request-failure-resource_exhausted-on-respond-operations). On some SDK versions, sustained server throttling on `RespondWorkflowTaskCompleted` can cascade into a workflow task timeout — the task times out while the SDK is still retrying the throttled respond call.

            **5. Check server-side service and persistence latency.**
            If SDK-side metrics look normal and the execution was not terminated or timed out, check the server dashboard:
            - [**Frontend Service Latency** panel (§4 — Service Latencies)](../../../dashboards/server/temporal-server-readme.md) filtered to `RespondWorkflowTaskCompleted`
            - [**Persistence Latencies** panel (§3 — Persistence Requests, Latencies and Errors)](../../../dashboards/server/temporal-server-readme.md#3-persistence-requests-latencies-and-errors) filtered to `UpdateWorkflowExecution`

            **6. Check whether the execution was explicitly terminated.**
            If the NOT_FOUND is on `RespondWorkflowTaskFailed` (not Completed), also check whether the execution was terminated intentionally — look at the `WorkflowExecutionTerminated` event in history and cross-check the **Workflow Terminate** panel on the server dashboard.
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/01a-not-found-wft-respond.md

      - uid: temporal-sdk-java-micrometer-001b
        title: "Temporal SDK Java (Micrometer): NOT_FOUND on Activity Respond Operations"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P7AC1CE4626B85CB6  # DATASOURCE
            model:
              editorMode: code
              expr: |
                sum by (namespace, operation) (
                  rate(temporal_request_failure_total{status_code="NOT_FOUND", operation=~"RespondActivityTaskCompleted|RespondActivityTaskFailed"}[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          service: temporal-sdk
          component: activity
        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): NOT_FOUND on activity respond — task timed out or execution no longer running"
          description: |
            **1. Check activity execution latency.**
            Look at `temporal_activity_execution_latency` on the SDK dashboard for the affected `activity_type` and task queue. If p99 is elevated and approaching or exceeding the `startToClose` timeout, activities are consistently finishing too late — that is the direct cause.

            **2. Check worker pod resources.**
            Check CPU and memory utilization on the activity worker pods — high CPU slows activity execution directly. Also check for cold-start issues on the pod that picked up the task: look at the `identity` field in the `ActivityTaskStarted` history event, or in the pending activity info if this is not the final attempt.

            **3. Check whether the workflow execution is still running.**
            Look at the execution status in the Temporal UI or via `tctl`. If the execution completed, was terminated, or hit a run timeout, the NOT_FOUND is expected and not a signal of a timeout problem — check whether the execution lifecycle is behaving as expected.

            **4. Check for worker restarts.**
            If worker pods are restarting frequently during activity execution, in-flight task tokens are lost on restart. The server reschedules the activity but the original worker may still attempt to respond after coming back up. Check pod restart counts in your infrastructure observability stack.

            **5. Check for RESOURCE_EXHAUSTED on respond operations.**
            Cross-check alert [#2b — RESOURCE_EXHAUSTED on Respond Operations](../alerts-index.md#alert-2b--request-failure-resource_exhausted-on-respond-operations). Sustained throttling on `RespondActivityTaskCompleted` can delay the respond call long enough for the server to time out the task before the response lands.

            **6. Check server-side service and persistence latency.**
            If activity latency looks normal, check the server dashboard:
            - [**Frontend Service Latency** panel (§4 — Service Latencies)](../../../dashboards/server/temporal-server-readme.md) filtered to `RespondActivityTaskCompleted` and `RespondActivityTaskFailed`
            - [**Persistence Latencies** panel (§3 — Persistence Requests, Latencies and Errors)](../../../dashboards/server/temporal-server-readme.md#3-persistence-requests-latencies-and-errors) filtered to `UpdateWorkflowExecution`
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/01b-not-found-activity-respond.md

      - uid: temporal-sdk-java-micrometer-001c
        title: "Temporal SDK Java (Micrometer): NOT_FOUND on RecordActivityTaskHeartbeat"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P7AC1CE4626B85CB6  # DATASOURCE
            model:
              editorMode: code
              expr: |
                sum by (namespace) (
                  rate(temporal_request_failure_total{status_code="NOT_FOUND", operation="RecordActivityTaskHeartbeat"}[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          service: temporal-sdk
          component: activity
        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): NOT_FOUND on heartbeat — heartbeat timeout or activity timed out"
          description: |
            **1. Check the heartbeat interval vs heartbeatTimeout.**
            The worker must call heartbeat more frequently than the configured `heartbeatTimeout`. If the activity is slow between heartbeat calls — due to CPU pressure, blocking I/O, or downstream throttling — the effective heartbeat interval increases. Compare the activity's heartbeat call frequency in worker logs against its `heartbeatTimeout` setting.

            **2. Check worker CPU utilization.**
            A CPU-starved worker slows down between heartbeat calls even when the activity is making progress. Check per-pod CPU utilization — if consistently high, consider reducing `maxConcurrentActivityExecutionSize` to lower per-pod concurrency, or scale out horizontally.

            **3. Check for RESOURCE_EXHAUSTED on RecordActivityTaskHeartbeat.**
            Cross-check alert [#2d — RESOURCE_EXHAUSTED on Other Operations](../alerts-index.md#alert-2d--request-failure-resource_exhausted-on-other-operations). If the server is throttling heartbeat calls, the effective heartbeat interval increases and can push past `heartbeatTimeout` even when the worker is calling on time. Check the [**Resource Exhausted with Cause** panel (§6 — Throttling and Limits)](../../../dashboards/server/temporal-server-readme.md) on the server dashboard.

            **4. Check startToClose timeout.**
            If the activity has been running longer than its `startToClose` timeout, the server times it out at the history level while the activity is still executing — the next heartbeat then returns NOT_FOUND. Check `temporal_activity_execution_latency` for the affected `activity_type` against the configured `startToClose` timeout.

            **5. Check heartbeat payload size.**
            The last heartbeat details payload is stored in shard mutable state and held in history service memory for the life of the activity attempt. Large heartbeat payloads on high-throughput activity workers can contribute to history host memory pressure. Keep heartbeat payloads small — store only the minimum progress state needed to resume on retry.
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/01c-not-found-heartbeat.md

      - uid: temporal-sdk-java-micrometer-002a
        title: "Temporal SDK Java (Micrometer): RESOURCE_EXHAUSTED on Critical User-Facing Operations"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: P7AC1CE4626B85CB6  # DATASOURCE
            model:
              editorMode: code
              expr: |
                sum by (namespace, operation) (
                  rate(temporal_request_failure_total{status_code="RESOURCE_EXHAUSTED", operation=~"StartWorkflowExecution|SignalWithStartWorkflowExecution|ExecuteMultiOperation|UpdateWorkflowExecution|SignalWorkflowExecution"}[5m])
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          service: temporal-sdk
          component: request
        annotations:
          __dashboardUid__: temporal-sdk-java-micrometer-v1
          __panelId__: "5"
          summary: "Temporal SDK Java (Micrometer): server throttling critical user-facing operations (starts, signals, updates)"
          description: |
            **1. Check the server Resource Exhausted panel.**
            Check the [**Resource Exhausted with Cause** panel (§6 — Throttling and Limits)](../../../dashboards/server/temporal-server-readme.md) on the server dashboard — this shows the throttle cause (`RpsLimit`, `ConcurrentLimit`, `SystemOverloaded`, `CircuitBreakerOpen`) and helps identify whether this is a namespace RPS limit, a system-wide overload, or a circuit breaker firing.

            **2. Check persistence latency.**
            Check the [**Persistence Latencies** panel (§3 — Persistence Requests, Latencies and Errors)](../../../dashboards/server/temporal-server-readme.md#3-persistence-requests-latencies-and-errors) filtered to `CreateWorkflowExecution` and `UpdateWorkflowExecution` — high persistence latency is the most common root cause of cascading throttling on these operations. If the database is slow, the frontend service backs up and starts throttling callers.

            **3. Check namespace RPS limits.**
            If the cause is `RpsLimit`, check whether `frontend.namespaceRPS` is set too low for your current traffic volume. Consider increasing it via dynamic config — but only after confirming persistence latency is healthy, otherwise increasing RPS into an already overloaded system will make things worse.

            **4. Check total cluster RPS.**
            Check the [**Total RPS** panel (§1 — Cluster Throughput)](../../../dashboards/server/temporal-server-readme.md) — if total cluster RPS is at or near capacity, the problem is cluster-level saturation, not namespace limits. Consider scaling frontend pods or the underlying database.

            **5. Check for system overload.**
            If the cause is `SystemOverloaded` or `CircuitBreakerOpen`, cross-check server alert [#30 — System Overload Throttling](../../server/runbooks/30-system-overload-throttling.md) — this indicates the server itself is under severe pressure and is shedding load to protect itself.
            Runbook: https://github.com/tsurdilo/temporal-metrics/blob/main/metrics/alerts/sdk/runbooks/02a-resource-exhausted-critical-ops.md

